<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página não encontrada — Zumegle</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-poppins { font-family: 'Poppins', sans-serif; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        @keyframes ping {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(2); opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen bg-slate-950 text-white flex flex-col items-center justify-center p-6 relative overflow-hidden">

    <!-- Decorativo de fundo -->
    <div class="absolute top-0 left-0 w-full h-full pointer-events-none">
        <div class="absolute top-20 left-10 w-80 h-80 bg-blue-600 opacity-5 rounded-full blur-3xl"></div>
        <div class="absolute bottom-20 right-10 w-96 h-96 bg-orange-500 opacity-5 rounded-full blur-3xl"></div>
    </div>

    <div class="relative z-10 text-center max-w-lg">

        <!-- Ícone flutuante -->
        <div class="animate-float mb-8 flex justify-center">
            <div class="bg-gradient-to-br from-blue-600 to-orange-500 p-6 rounded-3xl shadow-2xl shadow-blue-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 9a2 2 0 0 1-2 2H6l-4 4V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2z"></path>
                    <path d="M18 9h2a2 2 0 0 1 2 2v11l-4-4h-6a2 2 0 0 1-2-2v-1"></path>
                </svg>
            </div>
        </div>

        <!-- Código de erro -->
        <p class="text-8xl font-black font-poppins bg-gradient-to-r from-blue-400 to-orange-400 bg-clip-text text-transparent mb-2">404</p>

        <!-- Título -->
        <h1 class="text-2xl font-bold font-poppins text-white mb-3">Página não encontrada</h1>

        <!-- Descrição -->
        <p class="text-slate-400 text-base mb-10 leading-relaxed">
            Parece que esta página se perdeu no chat. Não se preocupa — ainda tens estranhos esperando para conversar!
        </p>

        <!-- Botão -->
        <a href="/"
           class="inline-flex items-center gap-3 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-bold py-4 px-10 rounded-2xl shadow-lg shadow-blue-600/30 hover:shadow-blue-600/50 hover:-translate-y-1 transition-all duration-300 font-poppins text-lg">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
            </svg>
            Voltar ao Chat
        </a>

        <!-- Logo -->
        <div class="mt-16 flex items-center justify-center gap-2 opacity-40">
            <div class="bg-gradient-to-br from-blue-600 to-blue-400 p-1.5 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
            </div>
            <span class="font-poppins font-extrabold text-lg"><span class="text-blue-400">Zu</span><span class="text-orange-400">megle</span></span>
        </div>
    </div>
</body>
</html>
